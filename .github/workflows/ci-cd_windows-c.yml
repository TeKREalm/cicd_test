name: Windows C CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    # 指定使用 Windows 最新版的雲端虛擬機
    runs-on: windows-latest 

    steps:
    - name: 檢出程式碼 (Checkout)
      uses: actions/checkout@v4

    - name: 設定 MSVC 編譯環境
      # 這個 Action 會幫你把 cl.exe 等編譯指令加入環境變數
      uses: ilammy/msvc-dev-cmd@v1

    - name: 編譯 C 程式碼
      # 假設你只有單一檔案；如果是複雜專案，這裡可以換成 msbuild 或 cmake 指令
      run: cl.exe /Fe:my_app.exe main.c

    - name: 執行基礎測試
      # 執行剛剛編譯出來的 .exe 來確認程式沒有閃退或崩潰
      run: .\my_app.exe

    - name: 封裝成品 (Upload Artifact)
      # 如果編譯與測試都成功，把 .exe 檔打包存放在 GitHub 上，準備給下一個「部署」階段使用
      uses: actions/upload-artifact@v4
      with:
        name: windows-executable
        path: my_app.exe
